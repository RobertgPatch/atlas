openapi: 3.1.0
info:
  title: Atlas K-1 Review & Finalization API
  version: 1.0.0
  description: |
    Wire contract for the K-1 Review Workspace (Screen #7) and the finalization
    flow that promotes a K-1 to `FINALIZED` and upserts the matching
    `partnership_annual_activity` row. All endpoints require an authenticated
    two-factor session cookie issued by Feature 001 and enforce entity scope via
    `entity_memberships`. Every lifecycle-changing mutation writes an
    `audit_events` row in the same transaction.

    Optimistic concurrency: every mutation on a K-1 uses `If-Match: <version>`
    carrying the client-held `k1_documents.version`. On stale version the server
    returns 409 `STALE_K1_VERSION` and no state is modified. Every mutation
    response includes the new version both in the body and as an `ETag` header.

    Two-person rule: `POST /k1/{id}/finalize` rejects with 403
    `SAME_ACTOR_FINALIZE_FORBIDDEN` when the acting user matches the K-1's
    current `approved_by_user_id`.

servers:
  - url: /v1

security:
  - sessionCookie: []

paths:

  /k1/{id}/review-session:
    get:
      summary: Load everything the Review Workspace needs for its initial render
      description: |
        Returns the K-1's current state, its parsed field values grouped into
        Entity Mapping / Partnership Mapping / Core, its open issues, its
        reported distribution, role-resolved capability flags (`canApprove`,
        `canFinalize`, `canEdit`), and the `version` the client must echo back
        on subsequent writes via `If-Match`.
      parameters:
        - $ref: '#/components/parameters/K1DocumentId'
      responses:
        '200':
          description: OK
          headers:
            ETag:
              description: Current `k1_documents.version`
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/K1ReviewSession' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /k1/{id}/pdf:
    get:
      summary: Stream the source PDF for the right-panel viewer
      description: |
        Returns the PDF bytes for the K-1. Scope is enforced; a caller without
        scope receives 403 and no body. Response is cacheable privately; revalidation
        uses the file's storage hash.
      parameters:
        - $ref: '#/components/parameters/K1DocumentId'
      responses:
        '200':
          description: OK
          content:
            application/pdf:
              schema: { type: string, format: binary }
          headers:
            Cache-Control:
              schema: { type: string, example: "private, max-age=300" }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /k1/{id}/corrections:
    post:
      summary: Save a batch of field corrections atomically
      description: |
        Applies all corrections in a single transaction. Auto-resolves any
        open `k1_issues` row whose `k1_field_value_id` names a corrected field
        and whose new value passes validation. May downgrade status from
        `READY_FOR_APPROVAL` to `NEEDS_REVIEW` if the save invalidates Approve
        preconditions (clears `approved_by_user_id` and emits
        `k1.approval_revoked`).
      parameters:
        - $ref: '#/components/parameters/K1DocumentId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/K1CorrectionsRequest' }
      responses:
        '200':
          description: Corrections saved
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/K1CorrectionsResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /k1/{id}/map/entity:
    post:
      summary: Map the K-1 to an existing entity
      description: |
        Resolves the submitted `entityId` against `entities` scoped to the
        caller's memberships. Free-typed names that do not resolve are rejected
        at the preceding typeahead endpoint; this endpoint only accepts a
        resolved id.
      parameters:
        - $ref: '#/components/parameters/K1DocumentId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/K1MapEntityRequest' }
      responses:
        '200': { $ref: '#/components/responses/MapResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /k1/{id}/map/partnership:
    post:
      summary: Map the K-1 to an existing partnership
      description: |
        The partnership's `entity_id` MUST match the K-1's current mapped entity.
        Mismatches are rejected with 400 `PARTNERSHIP_ENTITY_MISMATCH`.
      parameters:
        - $ref: '#/components/parameters/K1DocumentId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/K1MapPartnershipRequest' }
      responses:
        '200': { $ref: '#/components/responses/MapResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /k1/{id}/approve:
    post:
      summary: Transition NEEDS_REVIEW → READY_FOR_APPROVAL
      description: |
        Requires role `Admin` and `processing_status = 'NEEDS_REVIEW'` with no
        validation errors and no open issues. Sets `approved_by_user_id` and
        emits `k1.approved`.
      parameters:
        - $ref: '#/components/parameters/K1DocumentId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Approved
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/K1ApproveResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /k1/{id}/finalize:
    post:
      summary: Transition READY_FOR_APPROVAL → FINALIZED (two-person rule)
      description: |
        Requires role `Admin`, `processing_status = 'READY_FOR_APPROVAL'`, a
        mapped entity and partnership, no open issues, and a non-null Box 19A
        reported distribution. Rejected with 403 `SAME_ACTOR_FINALIZE_FORBIDDEN`
        when `auth.userId == approved_by_user_id`. In one transaction:
        flips status to `FINALIZED`, sets `finalized_by_user_id`, upserts
        `partnership_annual_activity` on `(entity_id, partnership_id, tax_year)`,
        and emits `k1.finalized`.
      parameters:
        - $ref: '#/components/parameters/K1DocumentId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Finalized
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/K1FinalizeResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /k1/{id}/issues:
    post:
      summary: Send the K-1 to the issue queue (open a new issue)
      description: |
        Creates a new `k1_issues` row. Optional `k1FieldValueId` links the
        issue to a specific field for auto-resolve on correction (FR-012).
        Does NOT change the K-1's lifecycle status.
      parameters:
        - $ref: '#/components/parameters/K1DocumentId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/K1OpenIssueRequest' }
      responses:
        '200':
          description: Issue opened
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/K1OpenIssueResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /k1/{id}/issues/{issueId}/resolve:
    post:
      summary: Manually resolve an open issue
      parameters:
        - $ref: '#/components/parameters/K1DocumentId'
        - in: path
          name: issueId
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Issue resolved
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/K1ResolveIssueResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

components:

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: atlas_session

  parameters:
    K1DocumentId:
      in: path
      name: id
      required: true
      description: The `k1_documents.id` of the K-1 under review.
      schema: { type: string, format: uuid }
    IfMatch:
      in: header
      name: If-Match
      required: true
      description: Client-held `k1_documents.version`. Stale values reject with 409 STALE_K1_VERSION.
      schema: { type: string }

  responses:
    Unauthorized:
      description: No valid session
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: |
        Caller lacks scope or role. `code` discriminates:
        `ENTITY_OUT_OF_SCOPE`, `ROLE_REQUIRED_ADMIN`, `SAME_ACTOR_FINALIZE_FORBIDDEN`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: K-1 not found or (intentionally indistinguishable) out of scope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: |
        Request failed validation. `code` discriminates: `VALIDATION_FAILED`,
        `PARTNERSHIP_ENTITY_MISMATCH`, `UNMAPPED_ENTITY`, `UNMAPPED_PARTNERSHIP`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: |
        Lifecycle or concurrency conflict. `code` discriminates:
        `STALE_K1_VERSION` (with `{ currentVersion }` in the body),
        `INVALID_STATE_TRANSITION`, `K1_FINALIZED`, `FINALIZE_PRECONDITION_FAILED`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    MapResponse:
      description: Mapping applied
      headers:
        ETag: { schema: { type: string } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/K1MapResponse' }

  schemas:

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - UNAUTHORIZED
            - ENTITY_OUT_OF_SCOPE
            - ROLE_REQUIRED_ADMIN
            - SAME_ACTOR_FINALIZE_FORBIDDEN
            - NOT_FOUND
            - VALIDATION_FAILED
            - PARTNERSHIP_ENTITY_MISMATCH
            - UNMAPPED_ENTITY
            - UNMAPPED_PARTNERSHIP
            - STALE_K1_VERSION
            - INVALID_STATE_TRANSITION
            - K1_FINALIZED
            - FINALIZE_PRECONDITION_FAILED
        message: { type: string }
        currentVersion:
          type: integer
          description: Present on STALE_K1_VERSION
        details:
          type: object
          additionalProperties: true

    K1Status:
      type: string
      enum: [UPLOADED, PROCESSING, NEEDS_REVIEW, READY_FOR_APPROVAL, FINALIZED]

    ConfidenceBand:
      type: string
      enum: [high, medium, low, none]

    K1SourceLocation:
      type: object
      required: [page, bbox]
      properties:
        page: { type: integer, minimum: 1 }
        bbox:
          type: array
          minItems: 4
          maxItems: 4
          items: { type: number, minimum: 0, maximum: 100 }

    K1FieldValue:
      type: object
      required:
        - id
        - fieldName
        - label
        - section
        - required
        - reviewStatus
        - isModified
        - linkedIssueIds
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        fieldName: { type: string }
        label: { type: string }
        section:
          type: string
          enum: [entityMapping, partnershipMapping, core]
        required: { type: boolean }
        rawValue: { type: [string, 'null'] }
        normalizedValue: { type: [string, 'null'] }
        reviewerCorrectedValue: { type: [string, 'null'] }
        confidenceScore: { type: [number, 'null'], minimum: 0, maximum: 1 }
        confidenceBand: { $ref: '#/components/schemas/ConfidenceBand' }
        sourceLocation:
          oneOf:
            - $ref: '#/components/schemas/K1SourceLocation'
            - type: 'null'
        reviewStatus: { type: string, enum: [PENDING, REVIEWED] }
        isModified: { type: boolean }
        linkedIssueIds:
          type: array
          items: { type: string, format: uuid }
        updatedAt: { type: string, format: date-time }

    K1Issue:
      type: object
      required: [id, issueType, severity, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        k1FieldValueId: { type: [string, 'null'], format: uuid }
        issueType: { type: string }
        severity: { type: string, enum: [LOW, MEDIUM, HIGH] }
        status: { type: string, enum: [OPEN, RESOLVED] }
        message: { type: [string, 'null'] }
        resolvedAt: { type: [string, 'null'], format: date-time }
        resolvedByUserId: { type: [string, 'null'], format: uuid }
        createdAt: { type: string, format: date-time }

    K1ReviewSession:
      type: object
      required:
        - k1DocumentId
        - version
        - status
        - partnership
        - entity
        - taxYear
        - uploadedAt
        - fields
        - issues
        - pdfUrl
        - canApprove
        - canFinalize
        - canEdit
      properties:
        k1DocumentId: { type: string, format: uuid }
        version: { type: integer, minimum: 0 }
        status: { $ref: '#/components/schemas/K1Status' }
        partnership:
          type: object
          required: [id, name, rawName]
          properties:
            id: { type: [string, 'null'], format: uuid }
            name: { type: [string, 'null'] }
            rawName: { type: [string, 'null'] }
        entity:
          type: object
          required: [id, name]
          properties:
            id: { type: [string, 'null'], format: uuid }
            name: { type: [string, 'null'] }
        taxYear: { type: integer, minimum: 2000 }
        uploadedAt: { type: string, format: date-time }
        approvedByUserId: { type: [string, 'null'], format: uuid }
        finalizedByUserId: { type: [string, 'null'], format: uuid }
        fields:
          type: object
          required: [entityMapping, partnershipMapping, core]
          properties:
            entityMapping:
              type: array
              items: { $ref: '#/components/schemas/K1FieldValue' }
            partnershipMapping:
              type: array
              items: { $ref: '#/components/schemas/K1FieldValue' }
            core:
              type: array
              items: { $ref: '#/components/schemas/K1FieldValue' }
        issues:
          type: array
          items: { $ref: '#/components/schemas/K1Issue' }
        reportedDistributionAmount: { type: [string, 'null'] }
        pdfUrl: { type: string, example: "/v1/k1/e7.../pdf" }
        canApprove: { type: boolean }
        canFinalize: { type: boolean }
        canEdit: { type: boolean }

    K1CorrectionsRequest:
      type: object
      required: [corrections]
      properties:
        corrections:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: object
            required: [fieldId, value]
            properties:
              fieldId: { type: string, format: uuid }
              value: { type: [string, 'null'], maxLength: 1000 }

    K1CorrectionsResponse:
      type: object
      required: [version, status, resolvedIssueIds, approvalRevoked]
      properties:
        version: { type: integer, minimum: 0 }
        status: { $ref: '#/components/schemas/K1Status' }
        resolvedIssueIds:
          type: array
          items: { type: string, format: uuid }
        approvalRevoked: { type: boolean }

    K1MapEntityRequest:
      type: object
      required: [entityId]
      properties:
        entityId: { type: string, format: uuid }

    K1MapPartnershipRequest:
      type: object
      required: [partnershipId]
      properties:
        partnershipId: { type: string, format: uuid }

    K1MapResponse:
      type: object
      required: [version, status]
      properties:
        version: { type: integer, minimum: 0 }
        status: { $ref: '#/components/schemas/K1Status' }

    K1ApproveResponse:
      type: object
      required: [version, status, approvedByUserId]
      properties:
        version: { type: integer, minimum: 0 }
        status: { type: string, enum: [READY_FOR_APPROVAL] }
        approvedByUserId: { type: string, format: uuid }

    K1FinalizeResponse:
      type: object
      required: [version, status, finalizedByUserId, partnershipAnnualActivityId]
      properties:
        version: { type: integer, minimum: 0 }
        status: { type: string, enum: [FINALIZED] }
        finalizedByUserId: { type: string, format: uuid }
        partnershipAnnualActivityId: { type: string, format: uuid }

    K1OpenIssueRequest:
      type: object
      properties:
        message: { type: string, maxLength: 2000 }
        k1FieldValueId: { type: string, format: uuid }
        severity: { type: string, enum: [LOW, MEDIUM, HIGH], default: MEDIUM }
        issueType: { type: string, maxLength: 100, default: MANUAL_FLAG }

    K1OpenIssueResponse:
      type: object
      required: [issueId, version]
      properties:
        issueId: { type: string, format: uuid }
        version: { type: integer, minimum: 0 }

    K1ResolveIssueResponse:
      type: object
      required: [version]
      properties:
        version: { type: integer, minimum: 0 }
